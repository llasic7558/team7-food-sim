# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team 7 Food Delivery compose.yml
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

volumes:
  restaurant-db-data:
  order-db-data:
  driver-db-data:

services:

  # ── Holmes — System Investigation Container
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color

  # ── Infrastructure ─────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  restaurant-db:
    image: postgres:16
    container_name: restaurant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: restaurants
    volumes:
      - restaurant-db-data:/var/lib/postgresql/data
      - ./restaurant-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d restaurants']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-db:
    image: postgres:16
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orders
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d orders']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  driver-db:
    image: postgres:16
    container_name: driver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: drivers
    volumes:
      - driver-db-data:/var/lib/postgresql/data
      - ./driver-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d drivers']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    rating-db:
      image: postgres:16
      container_name: rating
      restart: unless-stopped
      environment:
        POSTGRES_USER: app
        POSTGRES_PASSWORD: secret
        POSTGRES_DB: ratings
      volumes:
        - ratings-db-data:/var/lib/postgresql/data
        - ./rating-and-review-service/db:/docker-entrypoint-initdb.d
      networks:
        - team-net
      healthcheck:
        test: ['CMD-SHELL', 'pg_isready -U app -d drivers']
        interval: 5s
        timeout: 5s
        retries: 5
        start_period: 10s
      
    pricing-db:
      image: postgres:16
      container_name: rating
      restart: unless-stopped
      environment:
        POSTGRES_USER: app
        POSTGRES_PASSWORD: secret
        POSTGRES_DB: pricing
      volumes:
        - pricing-db-data:/var/lib/postgresql/data
      networks:
        - team-net
      healthcheck:
        test: ['CMD-SHELL', 'pg_isready -U app -d drivers']
        interval: 5s
        timeout: 5s
        retries: 5
        start_period: 10s


  # ── Core Services ──────────────────────────────────────────────────────────

  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@restaurant-db:5432/restaurants
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: restaurant-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      restaurant-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@order-db:5432/orders
      REDIS_URL: redis://redis:6379
      RESTAURANT_SERVICE_URL: http://restaurant-service:8000
      SERVICE_NAME: order-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy

  driver-service:
    build: ./driver-service
    container_name: driver-service
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@driver-db:5432/drivers
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: driver-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      driver-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    
  delivery-tracker-service:
    build: ./delivery-tracker-service
    container_name: delivery-tracker-service
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@driver-db:5432/drivers
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: delivery-tracker-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      driver-db:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  rating-and-review-service:
    build: ./rating-and-review-service
    container_name: rating-and-review-service
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@rating-db:5432/ratings
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: rating-and-review-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      driver-db:
        condition: service_healthy
      order-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  
