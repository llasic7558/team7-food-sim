# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team 7 Food Delivery compose.yml
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

volumes:
  restaurant-db-data:
  order-db-data:
  driver-db-data:
  ratings-db-data:
  pricing-db-data:

services:

  # ── Holmes — System Investigation Container
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color

  # ── Infrastructure ─────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  restaurant-db:
    image: postgres:16
    container_name: restaurant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: restaurants
    volumes:
      - restaurant-db-data:/var/lib/postgresql/data
      - ./restaurant-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d restaurants']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-db:
    image: postgres:16
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orders
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d orders']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  driver-db:
    image: postgres:16
    container_name: driver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: drivers
    volumes:
      - driver-db-data:/var/lib/postgresql/data
      - ./driver-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d drivers']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  rating-db:
    image: postgres:16
    container_name: rating-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ratings
    volumes:
      - ratings-db-data:/var/lib/postgresql/data
      - ./rating-and-review-service/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d ratings']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  pricing-db:
    image: postgres:16
    container_name: pricing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: pricing
    volumes:
      - pricing-db-data:/var/lib/postgresql/data
      - ./surge-pricing-worker/db:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d pricing']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s


  # ── Core Services ──────────────────────────────────────────────────────────

  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    ports:                      
      - "8002:8000" 
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@restaurant-db:5432/restaurants
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: restaurant-service
      PORT: 8000
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      restaurant-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    ports:                      
      - "8001:8000"    
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@order-db:5432/orders
      REDIS_URL: redis://redis:6379
      RESTAURANT_SERVICE_URL: http://restaurant-service:8000
      SERVICE_NAME: order-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:                      
      - "8003:8000" 
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@driver-db:5432/drivers
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: driver-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      driver-db:
        condition: service_healthy
      redis:
        condition: service_healthy
        
  order-dispatch-worker:
    build: ./order-dispatch-worker
    container_name: order-dispatch-worker
    ports:
      - "8110:8110"
    restart: unless-stopped
    networks:
      - team-net
    environment:
      REDIS_URL: redis://redis:6379
      DRIVER_SERVICE_URL: http://driver-service:8000
      RESTAURANT_SERVICE_URL: http://restaurant-service:8000
      SERVICE_NAME: order-dispatch-worker
      PORT: 8110
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8110/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy

  preparation-tracker-worker:
    build: ./preparation-tracker-worker
    container_name: preparation-tracker-worker
    ports:
      - "8100:8100"
    restart: unless-stopped
    networks:
      - team-net
    environment:
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: preparation-tracker-worker
      PORT: 8100
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8100/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

  delivery-tracker-service:
    build: ./delivery-tracker-service
    container_name: delivery-tracker-service
    ports:
      - "8005:8000"
    restart: unless-stopped
    networks:
      - team-net
    environment:
      REDIS_URL: redis://redis:6379
      DRIVER_SERVICE_URL: http://driver-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      SERVICE_NAME: delivery-tracker-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
  
  surge-pricing-worker:
    build: ./surge-pricing-worker
    container_name: surge-pricing-worker
    ports:
      - "8200:8200"
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@pricing-db:5432/pricing
      REDIS_URL: redis://redis:6379
      ORDER_SERVICE_URL: http://order-service:8000
      SERVICE_NAME: surge-pricing-worker
      PORT: 8200
      SURGE_WINDOW_SECONDS: 300
      SURGE_THRESHOLD: 5
      SURGE_MULTIPLIER: 1.5
      SURGE_DURATION_SECONDS: 600
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8200/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      pricing-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-worker: 
    build: ./notification-worker
    container_name: notification-worker
    restart: unless-stopped
    networks: 
      - team-net
    environment:
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: notification-worker
      PORT: 8000
    ports:
      - "8006:8000"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on: 
      redis:
        condition: service_healthy
   
  rating-and-review-service:
    build: ./rating-and-review-service
    container_name: rating-and-review-service
    ports:
      - "8004:8000"
    restart: unless-stopped
    networks:
      - team-net
    environment:
      DATABASE_URL: postgres://app:secret@rating-db:5432/ratings
      REDIS_URL: redis://redis:6379
      ORDER_SERVICE_URL: http://order-service:8000
      SERVICE_NAME: rating-and-review-service
      PORT: 8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      rating-db:
        condition: service_healthy
      order-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  
